yaya:
  version: 1.0
  prefix: ${user.home}/yaya   # 当前操作系统的用户家目录,目录可以自定义修改,此目录需要配置到SpringBoot的静态资源管理中
  captcha-timeout: 60000      # 验证码过期时间，单位为毫秒 当前设置为60秒,可以自定义时间
  token-timeout: 2592000000   # 用户登录token的过期时间 默认为30天

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/yaya-boot?characterEncoding=utf-8&useUnicode=true&useSSL=true&serverTimezone=GMT%2B8&allowMultiQueries=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: YLWTSMTJFYHDCMGSCWHSSYBZSDKC
  web:
    resources:
      static-locations: classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:${yaya.prefix}/  # 配置静态资源位置,通过服务器地址可以访问此目录下的资源
  servlet:
    multipart:
      max-file-size: 50MB      # 文件上传 - 单个文件限制
      max-request-size: 100MB  # 文件上传 - 总文件限制
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 1
      password: YLWTSMTJFYHDCMGSCWHSSYBZSDKC
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.yaya.boot.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: true # 开启二级缓存
