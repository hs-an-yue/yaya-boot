<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 响应式配置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- LayUI css库 -->
    <link rel="stylesheet" href="../layui/css/layui.css">
    <link rel="stylesheet" href="../css/yaya-common.css">
    <link rel="stylesheet" href="../css/yaya-style-extend.css">
    <link rel="stylesheet" href="../font/iconfont.css">
    <title>yaya-admin-plus</title>
</head>
<body>
    <div class="yaya-container">
        <div class="layui-fluid">
            <div id="ID-tree-menu" style="padding-bottom: 50px;"></div>
            <!-- 提交按钮 -->
            <button id="authMenu"  type="button" class="yaya-btn yaya-primary" style="position: fixed;width: 390px; bottom: 10px;left: 10px;">确定</button>
        </div>  
    </div>
    <script src="../layui/layui.js"></script>
    <script src="../js/server.js"></script>
    <script>
        layui.use(function(){
            const $ = layui.$;
            const tree = layui.tree;
            const layer = layui.layer;

            //获取当前页面地址对象
            let url = layui.url();
            //获取参数
            let roleId = url.search.roleId;

            //菜单显示和回显
            $.ajax({
                type:'get',
                url:server_url+'/getAuthMenuIdsByRoleId',
                headers:{
                    'Authorization': token
                },
                data:{
                    roleId:roleId
                },
                dataType:'json',
                success:function(resp){
                    if(resp.code===0){
                        //已授权的菜单ID
                        let data = resp.data;
                        //菜单列表
                        $.ajax({
                            type:'get',
                            url:server_url+'/getSysMenuTree',
                            headers:{
                                'Authorization': token
                            },
                            dataType:'json',
                            data:{flag:1},
                            success:function(resp){
                                if(resp.code===0){
                                    //生成菜单列表,并且回显回授权
                                    tree.render({
                                        elem: '#ID-tree-menu',
                                        data: resp.data,
                                        showCheckbox: true,
                                        onlyIconControl: true,
                                        id: 'menu-id',
                                        customName:{
                                            id:'menuId',
                                            title:'menuTitle',
                                            children: 'children'
                                        }
                                    });
                                    //回显
                                    tree.setChecked('menu-id', data);
                                }else{
                                    layer.msg("获取授权菜单失败");
                                }
                            }
                        });
                    }else{
                        layer.msg("获取已授权菜单失败");
                    }
                }
            });


            //菜单数据提交
            $("#authMenu").click(function(){
                //获取选中数据
                let checkData = tree.getChecked('menu-id');
                let ids = getAllMenuIds(checkData);
                console.log(checkData)
                console.log(ids)
                $.ajax({
                    type:'post',
                    url:server_url+'/addOrUpdateSysRoleMenu',
                    headers:{
                        'Authorization': token
                    },
                    data:{
                        roleId:roleId,
                        menuIds:ids.join(",")
                    },
                    dataType:'json',
                    success:function(resp){
                        if(resp.code===0){
                            //关闭弹窗
                            let index = parent.layer.getFrameIndex(window.name); // 先得到当前 iframe 层的索引
                            parent.layer.close(index); // 再执行关闭
                        }else{
                            layer.msg(resp.msg);
                        }
                    }
                });
            });


            //递归获取选中菜单中的菜单ID列表
            function getAllMenuIds(menus) {
                let ids = [];
                function traverse(menuList) {
                    for (const menu of menuList) {
                        ids.push(menu.menuId);
                        if (menu.children && menu.children.length > 0) {
                            traverse(menu.children);
                        }
                    }
                }
                traverse(menus);
                return ids;
            }

        });
    </script>
</body>
</html>
