<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon" />
    <title>用户设置</title>
    <link href="../layui/css/layui.css" rel="stylesheet">
    <link href="../css/yaya-common.css">
    <link rel="stylesheet" href="../font/iconfont.css">
    <style>
        .user-base{
            width: 100%;
            background-color: #fff;
        }
        .user-base>div{
            width: 100%;
        }
        .user-base>hr{
            width: 100%;
        }
        .user-info{
            display: flex;
            flex-direction: column;
            flex-wrap: nowrap;
            justify-content: flex-start;
            align-items: center;
        }

        .user-info>p{
            margin-top: 15px;
        }
        .user-info-list>img{
            height: 100px;
            width: 100px;
            border-radius: 50px;
            border: 1px solid #eeeeee;
            margin: 20px 0;
        }
        .user-info-list{
            display: flex;
            flex-direction: column;
            flex-wrap: nowrap;
            justify-content: flex-start;
            align-items: center;
        }
        .user-info-detail{
            width: 80%;
            display: flex;
            flex-direction: column;
            flex-wrap: nowrap;
            justify-content: flex-start;
        }
        .user-info-detail-item{
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            justify-content: space-between;
            align-items: center;
            height: 30px;
        }
        .user-info-detail-item>p{
            font-size: 14px;
        }
        .layui-tabs-header .layui-this, .layui-tabs-header li:hover{
            color: #16b777;
        }
        .layui-tabs-header .layui-this:after{
            border-bottom: 3px solid #16b777;
        }
        /*头像*/
        .avatar-container {
            text-align: center;
        }
        .avatar-wrapper {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid #ddd;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
            margin: 0 auto;
        }
        .avatar-wrapper:hover {
            transform: scale(1.05);
        }
        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .upload-text {
            margin-top: 10px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="yaya-container">
    <div class="layui-fluid">
        <div class="layui-row layui-col-space20">
            <div class="layui-col-md3 card-hover">
                <div class="user-base user-info">
                    <div style="margin: 10px 0 0 10px">
                        <h4>个人信息</h4>
                    </div>
                    <hr>
                    <div class="user-info-list">
                        <div class="avatar-container">
                            <div class="avatar-wrapper" id="avatar-upload">
                                <img id="avatarImg" src="../image/avatar.gif" alt="头像" class="avatar">
                            </div>
                            <p class="upload-text">点击头像上传新头像</p>
                        </div>
                        <div id="user-info-detail" class="user-info-detail">
                            <!-- 用户信息 -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-col-md9 card-hover">
                <div class="user-base layui-panel">
                    <!--标题-->
                    <div style="margin: 10px 0 0 10px">
                        <h4 style="color:#000000D9;">基本信息</h4>
                    </div>
                    <hr>
                    <div class="user-edit-info">
                        <!-- 表单提交区 -->
                        <div style="width: 95%;">
                            <form class="layui-form" lay-filter="user-val-filter">
                                <input type="hidden" name="userId" >
                                <div class="layui-form-item">
                                    <label class="layui-form-label">用户账号</label>
                                    <div class="layui-input-block">
                                        <input type="text" name="phone"  autocomplete="off" disabled  placeholder="账号" class="layui-input">
                                    </div>
                                </div>
                                <div class="layui-form-item">
                                    <label class="layui-form-label">用户邮箱</label>
                                    <div class="layui-input-block">
                                        <input type="text" name="email" autocomplete="off" lay-affix="clear" placeholder="邮箱" class="layui-input">
                                    </div>
                                </div>
                                <div class="layui-form-item">
                                    <label class="layui-form-label">用户名称</label>
                                    <div class="layui-input-block">
                                        <input type="text" name="username" autocomplete="off" lay-affix="clear" placeholder="名称" class="layui-input">
                                    </div>
                                </div>
                                <div class="layui-form-item">
                                    <label class="layui-form-label">用户性别</label>
                                    <div class="layui-input-block">
                                        <select name="sex">
                                            <option value="1">男</option>
                                            <option value="0">女</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="layui-form-item" style="display: flex;justify-content: center;">
                                    <button class="layui-btn layui-bg-blue" lay-submit lay-filter="edit">修改</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script id="ID-user-tpl" type="text/html">
    <hr>
    <!--用户账号-->
    <div class="user-info-detail-item">
        <p>用户账号</p>
        <p>{{= d.phone}}</p>
    </div>
    <hr>
    <!--用户邮箱-->
    <div class="user-info-detail-item">
        <p>用户邮箱</p>
        <p>{{= d.email}}</p>
    </div>
    <hr>
    <!--用户名称-->
    <div class="user-info-detail-item">
        <p>用户名称</p>
        <p>{{= d.username}}</p>
    </div>
    <hr>
    <!-- 用户性别 -->
    <div class="user-info-detail-item">
        <p>用户性别</p>
        <p>{{= d.sex}}</p>
    </div>
    <hr>
    <!--用户部门-->
    <div class="user-info-detail-item">
        <p>用户部门</p>
        <p>{{= d.deptName}}</p>
    </div>
    <hr>
    <!--用户角色-->
    <div class="user-info-detail-item">
        <p>用户角色</p>
        <p>{{= d.roleName}}</p>
    </div>
    <hr>
    <!--创建时间-->
    <div class="user-info-detail-item">
        <p>创建时间</p>
        <p>{{= d.createTime}}</p>
    </div>
    <hr>
</script>
<script src="../layui/layui.js"></script>
<script src="../js/server.js"></script>
<script>
    layui.use(function(){
        const $ = layui.$;
        const upload = layui.upload;
        const laytpl = layui.laytpl;
        const layer = layui.layer;
        const form = layui.form;

        //回显
        form.val('user-val-filter', {
            "userId": user.userId,
            "username": user.username,
            "phone": user.phone,
            "email": user.email,
            "sex": user.sex=='男'?1:0
        });
        
        //提交更新
        form.on('submit(edit)', function(data){
            let field = data.field; // 获取表单字段值
            //更新用户信息
            $.ajax({
                type:'post',
                url: server_url+'/updateSysUser',
                headers:{
                    'Authorization': token
                },
                contentType:'application/json',
                data:JSON.stringify(field),
                dataType:'json',
                success:function(resp){
                    if(resp.code!==0){
                        layer.msg(resp.msg);
                    }else{
                        //刷新本地库用户信息
                        user.email=field.email;
                        user.username=field.username;
                        user.sex=(field.sex=='1'?'男':'女');
                        layui.sessionData('yaya', {
                            key:'user',
                            value:user
                        });
                        //刷新外框
                        window.parent.location.reload();
                    }
                }
            });
            
            return false; // 阻止默认 form 跳转
        });


        //头像上传
        upload.render({
            elem: '#avatar-upload',
            url: server_url+'/uploadAvatar',
            headers: {'Authorization': token},
            done: function(res){
                if(res.code===0){
                    let avatar = res.data.avatar;
                    //上传成功
                    $("#avatarImg")[0].src=file_url+'/'+avatar;
                    //更新头像
                    $.ajax({
                        type:'post',
                        url: server_url+'/updateSysUserAvatar',
                        headers:{
                            'Authorization': token
                        },
                        contentType:'application/json',
                        data:JSON.stringify({"userId":user.userId,"avatar":avatar}),
                        dataType:'json',
                        success:function(resp){
                            if(resp.code!==0){
                                layer.msg(resp.msg);
                            }else{
                                //刷新头像 - 本地头像刷新
                                console.log("原来：",user);
                                //更新头像
                                user.avatar=avatar;
                                console.log("修改后：",user);
                                layui.sessionData('yaya', {
                                    key:'user',
                                    value:user
                                });
                                //刷新外框
                                window.parent.location.reload();
                            }
                        }
                    });
                }else{
                    layer.msg(res.msg);//失败自己处理
                }
            }
        });

        //头像渲染
        $("#avatarImg")[0].src = file_url+'/'+user.avatar;

        //laytpl模板引擎使用,用于渲染左侧用户信息
        let template = document.getElementById('ID-user-tpl').innerHTML;//模板
        let target = document.getElementById('user-info-detail'); // 输出结果的目标元素
        //渲染
        laytpl(template).render(user, function(html) {
            target.innerHTML = html;
        });

    });
</script>
</body>
</html>
