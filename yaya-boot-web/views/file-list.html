<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 响应式配置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- LayUI css库 -->
    <link rel="stylesheet" href="../layui/css/layui.css">
    <link rel="stylesheet" href="../css/yaya-common.css">
    <link rel="stylesheet" href="../css/yaya-style-extend.css">
    <title>yaya-admin-plus</title>
</head>
<body>
    <div class="yaya-container">
        <div class="layui-fluid">
            <div class="yaya-panel">
                <form class="layui-form" style="padding: 10px;">
                    <div class="layui-row">
                        <div class="layui-col-md3 layui-col-sm3 yaya-form-item">
                            <label class="yaya-form-label">文件名</label>
                            <div class="yaya-input-block">
                                <input type="text" name="fileName" placeholder="文件名" autocomplete="off" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-col-md3 layui-col-sm3 yaya-form-item">
                            <label class="yaya-form-label">租户</label>
                            <div class="yaya-input-block">
                                <select name="tenantId">
                                    <!-- 租户列表 -->
                                </select>
                            </div>
                        </div>
                        <div class="layui-col-md3 layui-col-sm3 yaya-form-item">
                            <label class="yaya-form-label">时间范围</label>
                            <div class="yaya-input-block">
                                <input type="text" class="layui-input" name="datetime" id="shortcut-range-date" placeholder="时间范围">
                            </div>
                        </div>
                        <div class="layui-col-md3 layui-col-sm3 yaya-form-item">
                            <button type="button" class="yaya-btn yaya-primary" lay-submit lay-filter="search">搜索</button>
                            <button type="reset" class="yaya-btn" style="margin-left: 10px;">重置</button>
                        </div>
                    </div>
                </form>
            </div>
            <div class="layui-panel card-border" style="margin-top: 10px;">
                <!-- 表格显示 -->
                <table class="layui-hide" id="table-file" lay-filter="table-file"></table>
            </div>
        </div>
    </div>
    <script src="../layui/layui.js"></script>
    <script src="../js/server.js"></script>
    <script>
        layui.use(function(){
            const $ = layui.$;
            const form = layui.form;
            const table = layui.table;
            const laydate = layui.laydate;

            //时间控件
            laydate.render({
                elem: "#shortcut-range-date",
                type: "datetime",
                range: true
            });


            //搜索
            form.on('submit(search)', function(data){
                let field = data.field; // 获得表单字段
                //时间处理
                let datetime = field.datetime;
                if(datetime && datetime.length>0){
                    const [startTime, endTime] = datetime.split(' - ').map(item => item.trim());
                    field.startTime=startTime;
                    field.endTime=endTime;
                }
                // 执行搜索重载
                table.reload('table-file', {
                    page: {
                        curr: 1, // 重新从第 1 页开始
                        prev:'上一页',
                        next:'下一页',
                        limit:10,
                        limits:[10,20,30,40,50],
                        theme:'#409eff'
                    },
                    where: field // 搜索的字段
                });
                return false; // 阻止默认 form 跳转
            });

            //租户下拉框
            let index = layer.load(0);//开启加载图标
            $.ajax({
                url: server_url+'/getSysTenantAll',
                type:'GET',
                dataType:'json',
                headers:{
                    'Authorization': token
                },
                success: function(resp){
                    //关闭加载图标
                    layer.close(index);
                    if(resp.code===0){
                        let list = resp.data;
                        let str='<option value="">租户</option>';
                        if(list && list.length>0){
                            for (let index = 0; index < list.length; index++) {
                                str+=`
                                    <option value="${list[index].tenantId}">${list[index].tenantName}</option>
                                `;
                            }
                        }
                        //设置到指定位置
                        $('select[name="tenantId"]').html(str);
                        //重新渲染
                        form.render("select");
                    }else{
                        layer.msg(resp.msg)
                    }
                }
            });
        
        
            //表格渲染
            table.render({
                elem: '#table-file',
                url: server_url+'/getFilePage',
                headers:{
                    'Authorization':token
                },
                skin:'line',
                height:'full',
                parseData: function(res){
                    return {
                        "code" : res.code,
                        "msg"  : res.msg,
                        "data" : res.data.list,
                        "count": res.data.count
                    }
                },
                page:{
                    prev:'上一页',
                    next:'下一页',
                    limit:10,
                    limits:[10,20,30,40,50],
                    theme:'#409eff'
                },
                request: {
                    pageName: 'pageNo', // 页码的参数名称，默认：page
                    limitName: 'pageSize' // 每页数据条数的参数名，默认：limit
                },
                cols: [[
                    {
                        title: '#',
                        type: 'numbers'
                    },
                    {
                        field:'fileName',
                        title: '文件名称'
                    },
                    {
                        field:'fileType',
                        title:'文件类型'
                    },
                    {
                        title: '租户',
                        templet: function(d){
                            return d.sysTenant?d.sysTenant.tenantName:'-';
                        }
                    },
                    {
                        title: '上传人',
                        templet: function(d){
                            return d.uploadUser?d.uploadUser.username:'-';
                        }
                    },
                    {
                        field:'createTime',
                        title: '上传时间'
                    }
                ]]
            })
        });
    </script>
</body>
</html>
