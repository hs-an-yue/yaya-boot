<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 响应式配置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- LayUI css库 -->
    <link rel="stylesheet" href="../layui/css/layui.css">
    <link rel="stylesheet" href="../css/yaya-common.css">
    <link rel="stylesheet" href="../css/yaya-style-extend.css">
    <title>yaya-admin-plus</title>
</head>
<body>
    <div class="yaya-container">
        <div class="layui-fluid">
            <div class="layui-panel card-border">
                <!-- 菜单操作按钮 -->
                <div style="display: flex;flex-direction: row;justify-content: flex-end;padding: 10px;">
                    <button id="add-notice" type="button" class="yaya-btn yaya-primary">发布公告</button>
                </div>
                <!-- 表格显示 -->
                <table class="layui-hide" id="table-notice" lay-filter="table-notice"></table>
            </div>
        </div>
    </div>
    <script src="../layui/layui.js"></script>
    <script src="../js/server.js"></script>
    <script>
        layui.use(function(){
            const $ = layui.$;
            const form = layui.form;
            const table = layui.table;

        
            //单元格工具事件(一般用于进行编辑和删除操作)
            table.on('tool(table-notice)', function(obj){
                //事件
                let event = obj.event;
                if(event==='del'){ //删除事件
                    layer.confirm('确定删除吗？', function(index){
                        layer.close(index);//关闭弹窗
                        let noticeId = obj.data.noticeId;
                        //开启加载图标
                        let index_ = layer.load(0);
                        $.ajax({
                            url: server_url+'/deleteSysNotice',
                            type:'GET',
                            dataType:'json',
                            headers:{
                                'Authorization': token
                            },
                            data:{noticeId:noticeId},
                            success: function(resp){
                                //关闭加载图标
                                layer.close(index_);
                                if(resp.code===0){
                                    //刷新
                                    table.reload('table-notice');
                                }else{
                                    layer.msg(resp.msg)
                                }
                            }
                        });
                    });
                }else if(event==='edit'){ //编辑事件
                    layer.open({
                        type: 2, // page 层类型 iframe
                        area: ['800px', '550px'],
                        title: '编辑',
                        shade: 0.6, // 遮罩透明度
                        shadeClose: true, // 点击遮罩区域，关闭弹层
                        content: `notice-edit.html?noticeId=${obj.data.noticeId}&noticeTypeId=${obj.data.noticeTypeId}`,
                        end: function(){
                            //刷新表格
                            table.reload('table-notice');
                        }
                    });
                }else if(event==='detail'){ //详情
                    layer.open({
                        type: 2, // page 层类型 iframe
                        area: ['1100px', '550px'],
                        title: '消息详情',
                        maxmin: true,
                        shade: 0.6, // 遮罩透明度
                        shadeClose: true, // 点击遮罩区域，关闭弹层
                        content: `notice-detail.html?noticeId=${obj.data.noticeId}`,
                        end: function(){
                            //刷新表格
                            table.reload('table-notice');
                        },
                        success: function(layero, index){
                            layer.full(index); // 最大化
                        }
                    });
                }else if(event==='assign'){
                    layer.open({
                        type: 2, // page 层类型 iframe
                        area: ['450px', '350px'],
                        title: '分配用户',
                        shade: 0.6, // 遮罩透明度
                        shadeClose: true, // 点击遮罩区域，关闭弹层
                        content: `notice-assign.html?noticeId=${obj.data.noticeId}`,
                        end: function(){
                            //刷新表格
                            table.reload('table-notice');
                        }
                    });
                }else{
                    layer.msg("功能还在路上,敬请期待~");
                }
            });



            //添加
            $("#add-notice").click(function(){
                layer.open({
                    type: 2, // page 层类型 iframe
                    area: ['800px', '550px'],
                    title: '发布公告',
                    shade: 0.6, // 遮罩透明度
                    shadeClose: true, // 点击遮罩区域，关闭弹层
                    content: 'notice-add.html',
                    end: function(){
                        //刷新表格
                        table.reload('table-notice');
                    }
                });
            });

            
            //表格渲染
            table.render({
                elem: '#table-notice',
                url: server_url+'/getSysNoticePageByPublishUserId',
                headers:{
                    'Authorization':token
                },
                where:{publishUserId:user.userId},
                skin:'line',
                height:'full',
                parseData: function(res){
                    return {
                        "code" : res.code,
                        "msg"  : res.msg,
                        "data" : res.data.list,
                        "count": res.data.count
                    }
                },
                page:{
                    prev:'上一页',
                    next:'下一页',
                    limit:10,
                    limits:[10,20,30,40,50],
                    theme:'#409eff'
                },
                request: {
                    pageName: 'pageNo', // 页码的参数名称，默认：page
                    limitName: 'pageSize' // 每页数据条数的参数名，默认：limit
                },
                cols: [[
                    {
                        title: '#',
                        type: 'numbers'
                    },
                    {
                        field:'noticeTitle',
                        title: '标题'
                    },
                    {
                        title: '类型',
                        templet: function(d){
                            return d.sysNoticeType?d.sysNoticeType.noticeTypeName:'-';
                        }
                    },
                    {
                        title: '级别',
                        templet: function(d){
                            let noticeLevel = d.noticeLevel;
                            if(noticeLevel===0){
                                return '<span class="yaya-tag yaya-tag-light-success tag-small">普通</span>';
                            }else if(noticeLevel===1){
                                return '<span class="yaya-tag yaya-tag-light-primary tag-small">重要</span>';
                            }else{
                                return '<span class="yaya-tag yaya-tag-light-danger tag-small">紧急</span>';
                            }
                        }
                    },
                    {
                        title: '置顶',
                        templet: function(d){
                            if(d.isTop===1){
                                return '<span class="yaya-tag yaya-tag-light-danger tag-small">是</span>';
                            }else{
                                return '<span class="yaya-tag yaya-tag-light-success tag-small">否</span>';
                            }
                        }
                    },
                    {
                        title: '发布人',
                        templet: function(d){
                            return d.publishUser?d.publishUser.username:'-';
                        }
                    },
                    {
                        field:'createTime',
                        title: '创建时间'
                    },
                    {
                        title: '操作',
                        width:'15%',
                        fixed: 'right',
                        templet: function(){
                            let str='<button class="yaya-btn is-link-primary yaya-btn-small" lay-event="edit">更新</button>';
                            str+='<button class="yaya-btn is-link-danger yaya-btn-small" lay-event="del">删除</button>';
                            str+='<button class="yaya-btn is-link-success yaya-btn-small" lay-event="detail">详情</button>';
                            str+='<button class="yaya-btn is-link-warning yaya-btn-small" lay-event="assign">公告分配</button>';
                            return str;
                        }
                    }
                ]]
            })
        });
    </script>
</body>
</html>
