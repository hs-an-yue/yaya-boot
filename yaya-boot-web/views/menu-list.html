<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 响应式配置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- LayUI css库 -->
    <link rel="stylesheet" href="../layui/css/layui.css">
    <link rel="stylesheet" href="../css/yaya-common.css">
    <link rel="stylesheet" href="../css/yaya-style-extend.css">
    <link rel="stylesheet" href="../font/iconfont.css">
    <title>yaya-admin-plus</title>
    <style>
        .search-bar {
            padding: 16px 24px;
            border-bottom: 1px solid #eee;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            align-items: flex-end;
        }
        .form-item {
            display: flex;
            flex-direction: column;
            min-width: 150px;
        }
        input[type="text"], input[type="date"] {
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1em;
            width: 100%;
            box-sizing: border-box;
        }
        .layui-select-title>.layui-input{
            height: 34.4px;
        }
        .layui-layer-title{
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="yaya-container">
        <div class="layui-fluid">
            <div class="layui-panel card-border">
                <!-- 条件搜索 -->
                <form class="search-bar layui-form">
                    <div class="form-row">
                        <div class="form-item">
                            <input type="text" name="menuTitle"  placeholder="菜单名" />
                        </div>
                        <div class="form-item">
                            <select name="status">
                                <option value="">状态</option>
                                <option value="1">停用</option>
                                <option value="0">正常</option>
                            </select>
                        </div>
                        <div>
                            <button class="yaya-btn yaya-primary"  lay-submit lay-filter="search">查询</button>
                            <button class="yaya-btn yaya-default" type="reset">重置</button>
                        </div>
                    </div>
                </form>
            </div>
            
            <div class="layui-panel card-border" style="margin-top: 10px;">
                <!-- 菜单操作按钮 -->
                <div style="display: flex;flex-direction: row;justify-content: flex-end;padding: 10px;">
                    <button id="expandId" type="button" class="yaya-btn yaya-default" style="margin-right: 10px;">收起</button>
                    <button id="add-menu" type="button" class="yaya-btn yaya-primary">添加</button>
                </div>
                <!-- 表格显示 -->
                <table class="layui-hide" id="treeTable-menu" lay-filter="treeTable-menu"></table>
            </div>
        </div>   
    </div>
    <script src="../layui/layui.js"></script>
    <script src="../js/server.js"></script>
    <script>
        layui.use(function(){
            const $ = layui.$;
            const form = layui.form;
            const treeTable = layui.treeTable;
            const layer = layui.layer;


            //单元格工具事件(一般用于进行编辑和删除操作)
            treeTable.on('tool(treeTable-menu)', function(obj){
                console.log(obj);
                //事件
                let event = obj.event;
                if(event==='del'){//删除事件
                    layer.confirm('确定删除吗？', function(index){
                        obj.del(); // 删除对应行（tr）的 DOM 结构
                        layer.close(index);//关闭弹窗
                        // 向后端发送删除请求，执行完毕后，可通过 reloadData 方法完成数据重载
                        let menuId = obj.data.menuId;
                        //开启加载图标
                        let index_ = layer.load(0);
                        $.ajax({
                            url: server_url+'/deleteSysMenu',
                            type:'GET',
                            dataType:'json',
                            headers:{
                                'Authorization': token
                            },
                            data:{menuId:menuId},
                            success: function(resp){
                                //关闭加载图标
                                layer.close(index_);
                                if(resp.code===0){
                                    treeTable.reloadData('treeTable-menu', {
                                        scrollPos: 'fixed'  // 保持滚动条位置不变 - v2.7.3 新增
                                    });
                                }else{
                                    layer.msg(resp.msg)
                                }
                            }
                        });
                    });
                }else if(event==='edit'){//编辑事件
                    layer.open({
                        type: 2, // page 层类型 iframe
                        area: ['410px', '450px'],
                        title: '编辑',
                        shade: 0.6, // 遮罩透明度
                        shadeClose: true, // 点击遮罩区域，关闭弹层
                        content: `menu-edit.html?menuType=${obj.data.menuType}&menuIcon=${obj.data.menuIcon}`,
                        end: function(){
                            //刷新表格
                            treeTable.reload('treeTable-menu');
                        },
                        success: function(layero, index){
                            let body = layer.getChildFrame('body', index);
                            // 给 iframe 页中的某个输入框赋值
                            body.find('input[name="menuId"]').val(obj.data.menuId);
                            body.find('input[name="parentId"]').val(obj.data.parentId);
                            body.find('input[name="menuTitle"]').val(obj.data.menuTitle);
                            body.find('input[name="orderNum"]').val(obj.data.orderNum);
                            body.find('input[name="menuIcon"]').val(obj.data.menuIcon);
                            body.find('input[name="menuUrl"]').val(obj.data.menuUrl);
                            body.find('input[name="perms"]').val(obj.data.perms);
                        }
                    });
                }else if(event==='add'){//添加事件
                    layer.open({
                        type: 2, // page 层类型 iframe
                        area: ['410px', '450px'],
                        title: '添加',
                        shade: 0.6, // 遮罩透明度
                        shadeClose: true, // 点击遮罩区域，关闭弹层
                        content: 'menu-add.html',
                        end: function(){
                            //刷新表格
                            treeTable.reload('treeTable-menu');
                        },
                        success: function(layero, index){
                            let body = layer.getChildFrame('body', index);
                            // 给 iframe 页中的某个输入框赋值
                            body.find('input[name="parentId"]').val(obj.data.menuId);
                        }
                    });
                }else{
                    layer.msg("功能还在路上,敬请期待~");
                }
            });

            //添加一级菜单
            $("#add-menu").click(function(){
                layer.open({
                    type: 2, // page 层类型 iframe
                    area: ['410px', '450px'],
                    title: '添加',
                    shade: 0.6, // 遮罩透明度
                    shadeClose: true, // 点击遮罩区域，关闭弹层
                    content: 'menu-add.html',
                    end: function(){
                        //刷新表格
                        treeTable.reload('treeTable-menu');
                    }
                });
            });

            //树状表格收起
            $("#expandId").click(function(){
                treeTable.expandAll('treeTable-menu', false);
            });

            //搜索渲染
            form.on('submit(search)', function(data){
                let field = data.field; // 获得表单字段
                // 执行搜索重载
                treeTable.reload('treeTable-menu', {
                    page: {
                        curr: 1, // 重新从第 1 页开始
                        prev:'上一页',
                        next:'下一页',
                        limit:10,
                        limits:[10,20,30,40,50],
                        theme:'#409eff'
                    },
                    where: field // 搜索的字段
                });
                return false; // 阻止默认 form 跳转
            });

            //表格渲染
            treeTable.render({
                elem: '#treeTable-menu',
                url: server_url+'/getSysMenuTree',
                headers:{
                    'Authorization':token
                },
                skin:'line',
                height:'full',
                parseData: function(res){
                    return {
                        "code": res.code,
                        "msg": res.msg,
                        "data":res.data
                    }
                },
                tree:{
                    customName:{
                        name:'menuTitle',
                        id:'menuId',
                        pid:'parentId',
                        icon:'menuIcon'
                    },
                    view:{
                        // 菜单是否展开
                        expandAllDefault:true
                    }
                },
                cols: [[
                    {
                        type: 'numbers',title:'#'
                    },
                    {
                        field:'menuTitle',
                        title: '菜单名称'
                    },
                    {
                        field:'orderNum',
                        width:'10%',
                        title: '排序'
                    },
                    {
                        title: '图标',
                        width:'10%',
                        templet: function(d){
                            return `<i class='${d.menuIcon}'></i>`;
                        }
                    },
                    {
                        title: '菜单类型',
                        width:'10%',
                        templet: function(d){
                            let menuType = d.menuType;
                            if(menuType===1){
                                return '<span class="yaya-tag yaya-tag-light-warning tag-small">目录</span>';
                            }else if(menuType===2){
                                return '<span class="yaya-tag yaya-tag-light-success tag-small">菜单</span>';
                            }else{
                                return '<span class="yaya-tag yaya-tag-light-danger tag-small">按钮</span>';
                            }
                        }
                    },
                    {
                        field:'perms',
                        width:'10%',
                        title: '权限标识'
                    },
                    {
                        title: '状态',
                        width:'10%',
                        templet: function(d){
                            let status = d.status;
                            if(status===0){
                                return `<span style='color:#1476ff;background-color:#e6f4ff;border-color:#8fc9ff;padding:4px 9px;border-radius:4px;font-size:12px;'>正常</span>`;
                            }else{
                                return `<span style='color:#ff3860;background-color:#fff0f0;border-color:#ffb3ba;padding:4px 9px;border-radius:4px;font-size:12px;'>停用</span>`;
                            }
                        }
                    },
                    {
                        field:'createTime',
                        width:'13%',
                        title: '创建时间'
                    },
                    {
                        width:'15%',
                        title: '操作',
                        templet: function(d){
                            let str='<button class="yaya-btn is-link-primary yaya-btn-small" lay-event="edit">更新</button>';
                            str+='<button class="yaya-btn is-link-danger yaya-btn-small" lay-event="del">删除</button>';
                            str+='<button class="yaya-btn is-link-success yaya-btn-small" lay-event="add">添加</button>';
                            return str;
                        }
                    }
                ]]
            })
        });
    </script>
</body>
</html>
