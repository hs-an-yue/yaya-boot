<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 响应式配置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- LayUI css库 -->
    <link rel="stylesheet" href="../layui/css/layui.css">
    <link rel="stylesheet" href="../css/yaya-common.css">
    <link rel="stylesheet" href="../css/yaya-style-extend.css">
    <title>yaya-admin-plus</title>
    <style>
        .layui-form-radio:hover>*, .layui-form-radioed, .layui-form-radioed>i{
            color: #1476ff;
        }
        .layui-input:focus,.layui-textarea:focus {
            border-color: #1476ff!important;
            box-shadow: 0 0 0 3px rgba(22,183,119,.08)
        }
        .icon-item {
            display: inline-block;
            padding: 8px;
            cursor: pointer;
            font-size: 20px;
            width: 40px;
            text-align: center;
        }
        .icon-item:hover {
            background-color: #f0f0f0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="yaya-container">
        <div class="layui-fluid">
            <form class="layui-form" style="margin-top: 10px;">
                <input type="hidden" name="tenantId">
                <div class="layui-form-item">
                    <label class="layui-form-label">租户名</label>
                    <div class="layui-input-block">
                        <input type="text" name="tenantName" lay-verify="required" placeholder="请输入租户名" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">备注</label>
                    <div class="layui-input-block">
                        <input type="text" name="remark" lay-verify="required" placeholder="请输入备注" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-form-item">
                    <button type="button" class="yaya-btn yaya-primary" style="width: 100%;" lay-submit lay-filter="edit">更新</button>
                </div>
            </form>
        </div>  
    </div>
    <script src="../layui/layui.js"></script>
    <script src="../js/server.js"></script>
    <script>
        layui.use(function(){
            const $ = layui.$;
            const form = layui.form;
            const layer = layui.layer;


            //提交更新租户事件
            form.on('submit(edit)', function(data){
                let field = data.field; // 获取表单字段值
                //参数json化
                let params = JSON.stringify(field);
                //AJAX请求
                $.ajax({
                    type:'post',
                    url: server_url+'/updateSysTenant',
                    headers:{
                        'Authorization': token
                    },
                    contentType:'application/json',
                    data:params,
                    dataType:'json',
                    success:function(resp){
                        if(resp.code===0){
                            //关闭弹窗
                            let index = parent.layer.getFrameIndex(window.name); // 先得到当前 iframe 层的索引
                            parent.layer.close(index); // 再执行关闭
                        }else{
                            layer.msg(resp.msg);
                        }
                    }
                });
                return false; // 阻止默认 form 跳转
            });
        });
    </script>
</body>
</html>
