<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 响应式配置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- LayUI css库 -->
    <link rel="stylesheet" href="../layui/css/layui.css">
    <link rel="stylesheet" href="../css/yaya-common.css">
    <link rel="stylesheet" href="../css/yaya-style-extend.css">
    <title>部门管理</title>
</head>
<body>
    <div class="yaya-container">
        <div class="layui-fluid">
            <div class="layui-row">
                <!-- 搜索条件 -->
                <div class="yaya-panel">
                    <form class="layui-form" style="padding: 10px 0;">
                        <div class="layui-row">
                            <div class="layui-col-md3 layui-col-sm3 yaya-form-item">
                                <label class="yaya-form-label">部门名称</label>
                                <div class="yaya-input-block">
                                    <input type="text" name="deptName" placeholder="请输入" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-col-md3 layui-col-sm3 yaya-form-item">
                                <label class="yaya-form-label">租户</label>
                                <div class="yaya-input-block">
                                    <select name="tenantId">
                                        <!-- 租户列表 -->
                                    </select>
                                </div>
                            </div>
                            <div class="layui-col-md3 layui-col-sm3 yaya-form-item">
                                <label class="yaya-form-label">状态</label>
                                <div class="yaya-input-block">
                                    <select name="status">
                                        <option value="">状态</option>
                                        <option value="0">有效</option>
                                        <option value="1">无效</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-col-md3 layui-col-sm3 yaya-form-item">
                                <button type="button" class="yaya-btn yaya-primary" lay-submit lay-filter="search">搜索</button>
                                <button type="reset" class="yaya-btn" style="margin-left: 10px;">重置</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            <div class="layui-row layui-panel" style="margin-top: 15px;">
                <!-- 菜单操作按钮 -->
                <div style="display: flex;flex-direction: row;justify-content: flex-end;padding: 10px;">
                    <button id="del-dept" type="button" class="yaya-btn yaya-danger" style="margin-right: 10px;">删除</button>
                    <button id="expandId" type="button" class="yaya-btn yaya-default" style="margin-right: 10px;">收起</button>
                    <button id="add-dept" type="button" class="yaya-btn yaya-primary">添加</button>
                </div>
                <!-- 表格显示 -->
                <table class="layui-hide" id="treeTable-dept" lay-filter="treeTable-dept"></table>
            </div>
        </div>
    </div>
    <script src="../layui/layui.js"></script>
    <script src="../js/server.js"></script>
    <script>
        layui.use(function(){

            const treeTable = layui.treeTable;
            const $ = layui.$;
            const form = layui.form;


            //租户下拉框
            //开启加载图标
            let index = layer.load(0);
            $.ajax({
                url: server_url+'/getSysTenantAll',
                type:'GET',
                dataType:'json',
                headers:{
                    'Authorization': token
                },
                success: function(resp){
                    //关闭加载图标
                    layer.close(index);
                    if(resp.code===0){
                        let list = resp.data;
                        let str='<option value="">租户</option>';
                        if(list && list.length>0){
                            for (let index = 0; index < list.length; index++) {
                                str+=`<option value="${list[index].tenantId}">${list[index].tenantName}</option>`;
                            }
                        }
                        //设置到指定位置
                        $('select[name="tenantId"]').html(str);
                        //重新渲染
                        form.render("select");
                    }else{
                        layer.msg(resp.msg)
                    }
                }
            });



            //批量删除
            $("#del-dept").click(function(){
                //获取选中的数据
                let checkStatus = treeTable.checkStatus('treeTable-dept');
                //获取要删除的角色ID
                let depts = checkStatus.data;
                if(depts && Object.keys(depts).length>0){
                    layer.confirm('确定删除吗？', function(index){
                       let deptIds = depts.map(dept => dept.deptId);
                        //AJAX提交
                        //开启加载图标
                        let index_ = layer.load(0);
                        $.ajax({
                            type:'post',
                            url: server_url+'/batchDeleteSysDepartment',
                            headers:{
                                'Authorization': token
                            },
                            contentType:'application/json',
                            data:JSON.stringify(deptIds),
                            dataType:'json',
                            success:function(resp){
                                //关闭加载图标
                                layer.close(index_);
                                if(resp.code===0){
                                    //关闭弹窗
                                    layer.close(index);
                                    //刷新表格
                                    treeTable.reload('treeTable-dept');
                                }else{
                                    layer.msg(resp.msg);
                                }
                            }
                        }); 
                    });
                }else{
                    layer.msg('请选择要删除的部门');
                }
            });


            //单元格工具事件(一般用于进行编辑和删除操作)
            treeTable.on('tool(treeTable-dept)', function(obj){
                //事件
                let event = obj.event;
                if(event==='del'){//删除事件
                    layer.confirm('确定删除吗？', function(index){
                        layer.close(index);//关闭弹窗
                        // 向后端发送删除请求，执行完毕后，可通过 reloadData 方法完成数据重载
                        let deptId = obj.data.deptId;
                        //开启加载图标
                        let index_ = layer.load(0);
                        $.ajax({
                            url: server_url+'/deleteSysDepartment',
                            type:'GET',
                            dataType:'json',
                            headers:{
                                'Authorization': token
                            },
                            data:{deptId:deptId},
                            success: function(resp){
                                //关闭加载图标
                                layer.close(index_);
                                if(resp.code===0){
                                    treeTable.reloadData('treeTable-dept');
                                }else{
                                    layer.msg(resp.msg)
                                }
                            }
                        });
                    });
                }else if(event==='edit'){//编辑事件
                    layer.open({
                        type: 2, // page 层类型 iframe
                        area: ['410px', '250px'],
                        title: '编辑',
                        shade: 0.6, // 遮罩透明度
                        shadeClose: true, // 点击遮罩区域，关闭弹层
                        content: `dept-edit.html`,
                        end: function(){
                            //刷新表格
                            treeTable.reload('treeTable-dept');
                        },
                        success: function(layero, index){
                            let body = layer.getChildFrame('body', index);
                            // 给 iframe 页中的某个输入框赋值
                            body.find('input[name="deptId"]').val(obj.data.deptId);
                            body.find('input[name="deptName"]').val(obj.data.deptName);
                            body.find('input[name="remark"]').val(obj.data.remark);
                        }
                    });
                }else if(event==='add'){//添加事件
                    layer.open({
                        type: 2, // page 层类型 iframe
                        area: ['410px', '350px'],
                        title: '添加',
                        shade: 0.6, // 遮罩透明度
                        shadeClose: true, // 点击遮罩区域，关闭弹层
                        content: 'dept-add.html',
                        end: function(){
                            //刷新表格
                            treeTable.reload('treeTable-dept');
                        },
                        success: function(layero, index){
                            let body = layer.getChildFrame('body', index);
                            // 给 iframe 页中的某个输入框赋值
                            body.find('input[name="parentId"]').val(obj.data.deptId);
                        }
                    });
                }else{
                    layer.msg("功能还在路上,敬请期待~");
                }
            });


            //树状表格收起
            $("#expandId").click(function(){
                treeTable.expandAll('treeTable-dept', false);
            });

            //添加一级菜单
            $("#add-dept").click(function(){
                layer.open({
                    type: 2, // page 层类型 iframe
                    area: ['410px', '350px'],
                    title: '添加',
                    shade: 0.6, // 遮罩透明度
                    shadeClose: true, // 点击遮罩区域，关闭弹层
                    content: 'dept-add.html',
                    end: function(){
                        //刷新表格
                        treeTable.reload('treeTable-dept');
                    }
                });
            });

            //搜索渲染
            form.on('submit(search)', function(data){
                let field = data.field; // 获得表单字段
                // 执行搜索重载
                treeTable.reload('treeTable-dept', {
                    where: field // 搜索的字段
                });
                return false; // 阻止默认 form 跳转
            });

            //表格渲染
            treeTable.render({
                elem: '#treeTable-dept',
                url: server_url+'/getSysDepartmentTree',
                headers:{
                    'Authorization':token
                },
                skin:'line',
                height:'full',
                cols: [[
                    {type: 'checkbox', fixed: 'left'},
                    {
                        title: '#',
                        type: 'numbers'
                    },
                    {field: 'deptName', title: '部门名称',width:300},
                    {
                        title: '租户',
                        width:200,
                        templet:function (row){
                            return row.sysTenant.tenantName;
                        }
                    },
                    {field: 'orderNum', title: '序号',width:80},
                    {
                        title: '状态',
                        width:100,
                        templet:function (row){
                            let status = row.status;
                            if(status===1){
                                return '<span class="yaya-tag yaya-tag-light-danger tag-small">无效</span>';
                            }else {
                                return '<span class="yaya-tag yaya-tag-light-success tag-small">有效</span>';
                            }
                        }
                    },
                    {field: 'remark', title: '备注',width:100},
                    {field: 'createTime', title: '创建时间',width:200},
                    {
                        title: "操作",
                        width:200,
                        fixed: 'right',
                        templet:function (d){
                            let str='<button class="yaya-btn is-link-primary yaya-btn-small" lay-event="edit">更新</button>';
                            str+='<button class="yaya-btn is-link-danger yaya-btn-small" lay-event="del">删除</button>';
                            str+='<button class="yaya-btn is-link-success yaya-btn-small" lay-event="add">添加</button>';
                            return str;
                        }
                    }
                ]],
                tree:{
                    customName:{
                        id:'deptId',
                        name:'deptName'
                    },
                    view:{
                        expandAllDefault:true
                    }

                },
                page: false
            });
        })
    </script>
</body>
</html>
