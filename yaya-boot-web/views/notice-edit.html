<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 响应式配置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- LayUI css库 -->
    <link rel="stylesheet" href="../layui/css/layui.css">
    <link rel="stylesheet" href="../css/yaya-common.css">
    <link rel="stylesheet" href="../css/yaya-style-extend.css">
    <link href="../css/editor-wang.css" rel="stylesheet"/>
    <title>yaya-admin-plus</title>
    <style>
        #editor—wrapper {
            border: 1px solid #ccc;
            z-index: 100; /* 按需定义 */
        }
        #toolbar-container {
            border-bottom: 1px solid #ccc;
        }
        #editor-container {
            height: 300px;
        }
        .layui-form-radio:hover>*, .layui-form-radioed, .layui-form-radioed>i{
            color: #409eff;
        }
        .layui-form-label{
            width: unset;
        }
    </style>
</head>
<body>
    <div class="yaya-container">
        <div class="layui-fluid">
            <form class="layui-form" style="margin-top: 10px;" lay-filter="notice-val-filter">
                <input type="hidden" name="noticeId">
                <div class="layui-form-item">
                    <label class="layui-form-label">公告标题</label>
                    <div class="layui-input-block">
                        <input type="text" name="noticeTitle" lay-verify="required" lay-reqtext="请输入公告标题" placeholder="公告标题" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">公告类型</label>
                    <div class="layui-input-block">
                        <select name="noticeTypeId" lay-verify="required">
                            <!-- 公告类型列表 -->
                        </select>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">公告级别</label>
                    <div class="layui-input-block">
                        <input type="radio" name="noticeLevel" value="0" title="普通" checked>
                        <input type="radio" name="noticeLevel" value="1" title="重要">
                        <input type="radio" name="noticeLevel" value="2" title="紧急">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">是否置顶</label>
                    <div class="layui-input-block">
                        <input type="radio" name="isTop" value="0" title="不置顶" checked>
                        <input type="radio" name="isTop" value="1" title="置顶">
                    </div>
                </div>
                <!-- 富文本编辑器 -->
                <textarea hidden name="noticeContent"></textarea>
                <div id="editor—wrapper" class="layui-form-item">
                    <div id="toolbar-container"><!-- 工具栏 --></div>
                    <div id="editor-container"><!-- 编辑器 --></div>
                </div>
                <div class="layui-form-item">
                    <button  class="yaya-btn yaya-primary layui-btn-fluid" lay-submit lay-filter="edit">更新发布</button>
                </div>
            </form>
        </div>  
    </div>
    <script src="../layui/layui.js"></script>
    <script src="../js/server.js"></script>
    <script src="../js/editor-wang.js"></script>
    <script>
        layui.use(function(){
            const $ = layui.$;
            const form = layui.form;
            const layer = layui.layer;
            const { createEditor, createToolbar } = window.wangEditor

            //获取url地址中的参数
            let url = layui.url();
            let search = url.search;

        
            //编辑器配置
            const editorConfig = {
                placeholder: '公告内容...',
                onChange(editor) {
                    const html = editor.getHtml()
                    // 也可以同步到 <textarea>
                    $('textarea[name="noticeContent"]').val(html);
                },
                // 配置图片上传
                MENU_CONF:{
                    uploadImage:{
                        server: file_url+'/uploadAvatar', // 替换为你的后端接口地址
                        fieldName: 'file',     // 后端接收的参数名
                        maxFileSize: 100 * 1024 * 1024, //限制100MB
                        customInsert(res, insertFn) {
                            if(res.code===0){//成功
                                insertFn(file_url+'/'+res.data.avatar, 'bad', '');
                            }else{
                                layer.msg(res.msg);
                            }
                        },
                        headers: {
                            // 常见的 JWT 格式
                            'Authorization': token
                        }
                    }
                }
            }

            const editor = createEditor({
                selector: '#editor-container',
                html: '<p><br></p>',
                config: editorConfig,
                mode: 'default', // or 'simple'
            })

            const toolbarConfig = {}

            const toolbar = createToolbar({
                editor,
                selector: '#toolbar-container',
                config: toolbarConfig,
                mode: 'simple'
            })

            //公告详情和回显
            //获取公告详情,进行数据更新回显
            let index_ = layer.load(0);//开启加载图标
            $.ajax({
                url: server_url+'/getSysNoticeById',
                type:'GET',
                dataType:'json',
                headers:{
                    'Authorization': token
                },
                data:{noticeId:search.noticeId},
                success: function(resp){
                    console.log(resp)
                    //关闭加载图标
                    layer.close(index_);
                    if(resp.code===0){
                        //表单回显
                        form.val('notice-val-filter', {
                            "noticeId": resp.data.noticeId,
                            "noticeTitle": resp.data.noticeTitle,
                            "noticeLevel": resp.data.noticeLevel,
                            "isTop": resp.data.isTop
                        });

                        //编辑器回显
                        editor.setHtml(resp.data.noticeContent);
                    }else{
                        layer.msg(resp.msg)
                    }
                }
            });


            //提交
            form.on('submit(edit)', function(data){
                let field = data.field; // 获取表单字段值
                //参数json化
                let params = JSON.stringify(field);
                //AJAX请求
                $.ajax({
                    type:'post',
                    url: server_url+'/updateSysNotice',
                    headers:{
                        'Authorization': token
                    },
                    contentType:'application/json',
                    data:params,
                    dataType:'json',
                    success:function(resp){
                        if(resp.code===0){
                            //关闭弹窗
                            let index = parent.layer.getFrameIndex(window.name); // 先得到当前 iframe 层的索引
                            parent.layer.close(index); // 再执行关闭
                        }else{
                            layer.msg(resp.msg);
                        }
                    }
                });
                return false; // 阻止默认 form 跳转
            });

            //公告类型列表(下拉回显)
            let index = layer.load(0);//开启加载图标
            $.ajax({
                url: server_url+'/getSysNoticeTypeListByTenantId',
                type:'GET',
                dataType:'json',
                headers:{
                    'Authorization': token
                },
                data:{tenantId:user.tenantId},
                success: function(resp){
                    //关闭加载图标
                    layer.close(index);
                    if(resp.code===0){
                        let list = resp.data;
                        let str='';
                        if(list && list.length>0){
                            //原类型
                            let noticeTypeId_old = search.noticeTypeId;
                            for (let index = 0; index < list.length; index++) {
                                if(noticeTypeId_old===list[index].noticeTypeId){
                                    str+=`<option selected value="${list[index].noticeTypeId}">${list[index].noticeTypeName}</option>`;
                                }else{
                                    str+=`<option value="${list[index].noticeTypeId}">${list[index].noticeTypeName}</option>`;
                                }
                                
                            }
                        }
                        //设置到指定位置
                        $('select[name="noticeTypeId"]').html(str);
                        //重新渲染
                        form.render("select");
                    }else{
                        layer.msg(resp.msg)
                    }
                }
            });

        });
    </script>
</body>
</html>
