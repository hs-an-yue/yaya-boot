<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 响应式配置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- LayUI css库 -->
    <link rel="stylesheet" href="../layui/css/layui.css">
    <link rel="stylesheet" href="../font/iconfont.css">
    <link rel="stylesheet" href="../css/yaya-common.css">
    <link rel="stylesheet" href="../css/yaya-style-extend.css">
    <title>用户管理</title>
    <style>
        .yaya-user-content{
            display: flex;
            justify-content: space-around;
            border-radius: 5px;
        }
        .yaya-user-left{
            background-color: white;
            width: 20%;
            height: calc(100vh);
            border-radius: 5px;
            overflow-y: auto;
            overflow-x: auto;
        }
        /* 滚动条样式 */
        .yaya-user-left {
            /* 滚动条宽度：auto, thin, 或 none */
            scrollbar-width: thin;
            /* 滚动条颜色：前者为滑块(thumb)颜色，后者为轨道(track)颜色 */
            scrollbar-color: #ffffff #f1f1f1;
        }
        .yaya-user-right{
            width: 79%;
        }
        /* 输入框内部placeholder的css样式 */
        input::placeholder {
            font-size: 12px;
        }
        .yaya-user-search{
            display: flex;
        }
        .yaya-user-search>div{
            height: 35px;
        }
        .yaya-user-search-btn{
            height: 35px;
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            justify-content: flex-end;
        }
        .yaya-user-search input{
            height: 35px;
        }
        .yaya-user-label{
            text-align: center;
            line-height: 35px;
        }
        /* xm-select 样式覆盖 */
        .yaya-user-condition xm-select{
            line-height: 35px;
            min-height: 35px;
        }
        .yaya-user-condition xm-select .xm-label .xm-label-block{
            font-size: 12px;
        }
        .yaya-user-condition xm-select > .xm-label .xm-label-block > span{
            font-size: 12px;
        }
        .yaya-user-condition xm-select > .xm-label .xm-label-block > i{
            font-size: 10px;
        }
        .layui-layer-title{
            border-bottom: 1px solid #fff;
        }
    </style>
</head>
<body>
    <div class="yaya-container">
        <div class="layui-fluid yaya-user-content">
            <div class="yaya-user-left">
                <!-- 部门搜索框 -->
                <div class="layui-form" style="margin-top: 10px;">
                    <div class="layui-row">
                        <div class="layui-col-md11" style="margin-left: 10px;">
                            <div class="layui-input-wrap" style="line-height: 35px;border-radius: 5px;">
                                <div class="layui-input-prefix">
                                    <i class="layui-icon layui-icon-search" style="font-size: 12px;"></i>
                                </div>
                                <input style="height: 35px;border-radius: 5px;" type="text" name="treeDeptId" placeholder="请输入所属部门" class="layui-input">
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 部门树形列表 -->
                <div id="dept-tree" style="margin-top: 5px;padding-bottom: 20px;"></div>
            </div>
            <div class="yaya-user-right">
                <!-- 搜索条件 -->
                <div class="yaya-panel">
                    <form class="layui-form" style="padding: 10px 0;">
                        <div class="layui-row">
                            <div class="layui-col-md3 layui-col-sm3 yaya-form-item">
                                <label class="yaya-form-label">姓名</label>
                                <div class="yaya-input-block">
                                    <input type="text" name="username" placeholder="姓名" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-col-md3 layui-col-sm3 yaya-form-item">
                                <label class="yaya-form-label">账号</label>
                                <div class="yaya-input-block">
                                    <input type="text" name="phone" placeholder="账号" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-col-md3 layui-col-sm3 yaya-form-item">
                                <label class="yaya-form-label">状态</label>
                                <div class="yaya-input-block">
                                    <select name="isEnabled">
                                        <option value="">状态</option>
                                        <option value="1">有效</option>
                                        <option value="0">禁用</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-col-md3 layui-col-sm3 yaya-form-item">
                                <label class="yaya-form-label">时间</label>
                                <div class="yaya-input-block">
                                    <input type="text" name="datetime" class="layui-input" id="shortcut-range-date" placeholder="时间范围">
                                </div>
                            </div>
                            <div class="layui-col-md3 layui-col-sm3 yaya-form-item">
                                <label class="yaya-form-label">性别</label>
                                <div class="yaya-input-block">
                                    <select name="sex">
                                        <option value="">性别</option>
                                        <option value="1">男</option>
                                        <option value="0">女</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-col-md3 layui-col-sm3 yaya-form-item" style="padding-top: 2px;">
                                <button type="button" class="yaya-btn yaya-primary" lay-submit lay-filter="search">搜索</button>
                                <button id="userReset" type="reset" class="yaya-btn" style="margin-left: 10px;">重置</button>
                            </div>
                        </div>
                    </form>
                </div>
                <!-- 内容显示 -->
                <div class="yaya-panel" style="margin-top: 10px;padding: 10px;">
                    <table class="layui-hide" id="table-user" lay-filter="table-user"></table>
                </div>
            </div>
        </div>
    </div>
    <script src="../layui/layui.js"></script>
    <script src="../js/xm-select.js"></script>
    <script src="../js/server.js"></script>
    <script>
        layui.use(function (){
            const tree = layui.tree;
            const table = layui.table;
            const layer = layui.layer;
            const laydate = layui.laydate;
            const $ = layui.$;
            const form = layui.form;

            //时间控件
            laydate.render({
                elem: "#shortcut-range-date",
                type: "datetime",
                range: true
            });

            //声明一个搜索条件
            let params={};

            //重置请求参数
            $("#userReset").click(function(){
                params={};
            });

            //搜索
            form.on('submit(search)', function(data){
                let field = data.field; // 获得表单字段
                
                //时间处理
                let datetime = field.datetime;
                if(datetime && datetime.length>0){
                    const [startTime, endTime] = datetime.split(' - ').map(item => item.trim());
                    field.startTime=startTime;
                    field.endTime=endTime;
                }
                params = Object.assign({},params,field);
                // 执行搜索重载
                table.reload('table-user', {
                    page: {
                        curr: 1, // 重新从第 1 页开始
                        prev:'上一页',
                        next:'下一页',
                        limit:10,
                        limits:[10,20,30,40,50],
                        theme:'#409eff'
                    },
                    where: params // 搜索的字段
                });
                return false; // 阻止默认 form 跳转
            });

            /* 用户列表 */
            table.render({
                elem: '#table-user',
                url: server_url+'/getSysUserPage',
                headers:{
                    'Authorization':token
                },
                skin:'line',
                height:'full',
                request: {
                    pageName: 'pageNo', // 页码的参数名称，默认：page
                    limitName: 'pageSize' // 每页数据条数的参数名，默认：limit
                },
                page: {
                    prev:'上一页',
                    next:'下一页',
                    theme:'#1e9fff'
                },
                defaultToolbar:[],
                toolbar:`
                    <div>
                        <button type="button" lay-event="add" class="yaya-btn is-plain-primary"><i class="iconfont icon-CRMEB-jia"></i>新增</button>
                        <button type="button" lay-event="userImport" class="yaya-btn is-plain-success"><i class="layui-icon layui-icon-upload-drag"></i>批量导入</button>
                        <button type="button" lay-event="batchDel" class="yaya-btn is-plain-danger"><i class="layui-icon layui-icon-delete"></i>批量删除</button>
                        <button type="button" lay-event="resetPwd" class="yaya-btn is-plain-info"><i class="iconfont icon-a-1_huaban1"></i>重置密码</button>
                        <button type="button" lay-event="userEnable" class="yaya-btn is-plain-warning"><i class="layui-icon layui-icon-vercode"></i>用户解封</button>
                        <button type="button" lay-event="userDisEnable" class="yaya-btn yaya-default"><i class="iconfont icon-CRMEB-cuo"></i>用户封禁</button>
                    </div>
                `,
                cols: [[
                    {type: 'checkbox', fixed: 'left'},
                    {field:'username', title: '姓名',width:150},
                    {field:'phone', title: '账号',width:150},
                    {
                        title: '头像',
                        width:100,
                        templet: function(row){
                            return `
                                <img style="width: 30px;height: 30px;border-radius: 15px;" src="${file_url}/${row.avatar}">
                            `;
                        }
                    },
                    {
                        title: '状态',
                        width:100,
                        templet: function(d){
                            let isEnabled = d.isEnabled;
                            if(isEnabled===1){
                                return '<span class="yaya-tag yaya-tag-light-success tag-small">可用</span>';
                            }else{
                                return '<span class="yaya-tag yaya-tag-light-warning tag-small">禁用</span>';
                            }
                        }
                    },
                    {
                        title: '角色名',
                        width:100,
                        templet: function(d){
                            return d.sysRole.roleName;
                        }
                    },
                    {
                        title: '角色符号',
                        width:200,
                        templet: function(d){
                            return `<span class="yaya-tag yaya-tag-light-primary">${d.sysRole.roleSymbol}</span>`;
                        }
                    },
                    {
                        title: '租户',
                        width:150,
                        templet: function(d){
                            return d.sysTenant.tenantName;
                        }
                    },
                    {
                        title: '部门',
                        width:100,
                        templet: function(d){
                            return d.sysDepartment.deptName;
                        }
                    },
                    {
                        title: '性别',
                        width:50,
                        templet: function(d){
                            return d.sex===1?'男':'女';
                        }
                    },
                    {field:'createTime', title: '创建时间',width: 200},
                    {field:'expiredTime', title: '过期时间',width: 200},
                    {
                        title: '操作',
                        fixed: 'right',
                        width: 110,
                        templet: function(row){
                            let phone = row.phone;
                            if(phone !== 'admin' && phone !== 'operation'){
                                let str = '<button lay-event="edit" class="yaya-btn is-link-success yaya-btn-small" type="button">更新</button>';
                                str += '<button lay-event="del" class="yaya-btn is-link-danger yaya-btn-small" type="button">删除</button>';
                                return str;
                            }
                            return '';
                        }
                    }
                ]],
                parseData: function(res){ // res 即为原始返回的数据
                    return {
                        "code": res.code, // 解析接口状态
                        "msg": res.msg, // 解析提示文本
                        "count": res.data.count, // 解析数据长度
                        "data":res.data.list // 解析数据列表
                    };
                }
            })


            //单元格事件
            table.on('tool(table-user)', function(obj){
                let event = obj.event;
                if(event==='del'){//删除
                    layer.confirm('确定删除吗？', function(index){
                        //AJAX提交
                        //开启加载图标
                        let index_ = layer.load(0);
                        $.ajax({
                            type:'get',
                            url: server_url+'/deleteSysUser',
                            headers:{
                                'Authorization': token
                            },
                            data:{userId:obj.data.userId},
                            dataType:'json',
                            success:function(resp){
                                //关闭加载图标
                                layer.close(index_);
                                if(resp.code===0){
                                    //关闭弹窗
                                    layer.close(index);
                                    //刷新表格
                                    table.reload('table-user');
                                }else{
                                    layer.msg(resp.msg,{icon: 3});
                                }
                            }
                        }); 
                    });
                }else if(event==='edit'){
                    layer.open({
                        type: 2, // page 层类型 iframe
                        area: ['650px', '550px'],
                        title: '更新',
                        shade: 0.6, // 遮罩透明度
                        shadeClose: true, // 点击遮罩区域，关闭弹层
                        content: `user-edit.html?roleId=${obj.data.roleId}&tenantId=${obj.data.tenantId}&deptId=${obj.data.deptId}&sex=${obj.data.sex}`,
                        end: function(){
                            //刷新表格
                            table.reload('table-user');
                        },
                        success: function(layero, index){
                            let body = layer.getChildFrame('body', index);
                            // 给 iframe 页中的某个输入框赋值
                            body.find('input[name="userId"]').val(obj.data.userId);
                            body.find('input[name="username"]').val(obj.data.username);
                            body.find('input[name="phone"]').val(obj.data.phone);
                            body.find('input[name="email"]').val(obj.data.email);
                            body.find('input[name="remark"]').val(obj.data.remark);
                            body.find('input[name="expiredTime"]').val(obj.data.expiredTime);
                        }
                    });
                } else{
                    layer.msg("功能还在路上~");
                }
            })

            // 头部工具栏事件
            table.on('toolbar(table-user)', function(obj){
                //事件
                let event = obj.event;
                if(event==='add'){
                    layer.open({
                        type: 2, // page 层类型 iframe
                        area: ['650px', '550px'],
                        title: '添加',
                        shade: 0.6, // 遮罩透明度
                        shadeClose: true, // 点击遮罩区域，关闭弹层
                        content: 'user-add.html',
                        end: function(){
                            //刷新表格
                            table.reload('table-user');
                        }
                    });
                }else if(event === 'batchDel'){
                    //获取选中的数据
                    let checkStatus = table.checkStatus('table-user');
                    //获取要删除的用户ID
                    let users = checkStatus.data;
                    if(users && Object.keys(users).length>0){
                        layer.confirm('确定删除吗？', function(index){
                            let userIds = users.map(user => user.userId);
                            //AJAX提交
                            //开启加载图标
                            let index_ = layer.load(0);
                            $.ajax({
                                type:'post',
                                url: server_url+'/deleteBatchSysUser',
                                headers:{
                                    'Authorization': token
                                },
                                contentType:'application/json',
                                data:JSON.stringify(userIds),
                                dataType:'json',
                                success:function(resp){
                                    //关闭加载图标
                                    layer.close(index_);
                                    if(resp.code===0){
                                        //关闭弹窗
                                        layer.close(index);
                                        //刷新表格
                                        table.reload('table-user');
                                    }else{
                                        layer.msg(resp.msg,{icon: 3});
                                    }
                                }
                            }); 
                        });
                    }else{
                        layer.msg('请选择要删除的用户');
                    }
                }else if(event === 'resetPwd'){
                    //获取选中的数据
                    let checkStatus = table.checkStatus('table-user');
                    //获取要重置的用户ID
                    let users = checkStatus.data;
                    if(users && Object.keys(users).length>0){
                        layer.confirm('确定重置密码？', function(index){
                        let userIds = users.map(user => user.userId);
                            //AJAX提交
                            //开启加载图标
                            let index_ = layer.load(0);
                            $.ajax({
                                type:'post',
                                url: server_url+'/batchResetSysUserPassword',
                                headers:{
                                    'Authorization': token
                                },
                                contentType:'application/json',
                                data:JSON.stringify(userIds),
                                dataType:'json',
                                success:function(resp){
                                    //关闭加载图标
                                    layer.close(index_);
                                    if(resp.code===0){
                                        //关闭弹窗
                                        layer.close(index);
                                        //刷新表格
                                        table.reload('table-user');
                                    }else{
                                        layer.msg(resp.msg,{icon: 4});
                                    }
                                }
                            }); 
                        });
                    }else{
                        layer.msg('请选择要重置密码的用户');
                    }
                }else if(event === 'userEnable'){
                    //获取选中的数据
                    let checkStatus = table.checkStatus('table-user');
                    //获取要重置的用户ID
                    let users = checkStatus.data;
                    if(users && Object.keys(users).length>0){
                        layer.confirm('确定解封用户？', function(index){
                        let userIds = users.map(user => user.userId);
                            //AJAX提交
                            //开启加载图标
                            let index_ = layer.load(0);
                            $.ajax({
                                type:'post',
                                url: server_url+'/batchEnableSysUserStatus',
                                headers:{
                                    'Authorization': token
                                },
                                contentType:'application/json',
                                data:JSON.stringify(userIds),
                                dataType:'json',
                                success:function(resp){
                                    //关闭加载图标
                                    layer.close(index_);
                                    if(resp.code===0){
                                        //关闭弹窗
                                        layer.close(index);
                                        //刷新表格
                                        table.reload('table-user');
                                    }else{
                                        layer.msg(resp.msg,{icon: 4});
                                    }
                                }
                            }); 
                        });
                    }else{
                        layer.msg('请选择要解封的用户');
                    }
                }else if(event === 'userDisEnable'){
                    //获取选中的数据
                    let checkStatus = table.checkStatus('table-user');
                    //获取要重置的用户ID
                    let users = checkStatus.data;
                    if(users && Object.keys(users).length>0){
                        layer.confirm('确定封禁用户？', function(index){
                        let userIds = users.map(user => user.userId);
                            //AJAX提交
                            //开启加载图标
                            let index_ = layer.load(0);
                            $.ajax({
                                type:'post',
                                url: server_url+'/batchDisSysUserStatus',
                                headers:{
                                    'Authorization': token
                                },
                                contentType:'application/json',
                                data:JSON.stringify(userIds),
                                dataType:'json',
                                success:function(resp){
                                    //关闭加载图标
                                    layer.close(index_);
                                    if(resp.code===0){
                                        //关闭弹窗
                                        layer.close(index);
                                        //刷新表格
                                        table.reload('table-user');
                                    }else{
                                        layer.msg(resp.msg,{icon: 4});
                                    }
                                }
                            }); 
                        });
                    }else{
                        layer.msg('请选择要封禁的用户');
                    }
                }else if(event === 'userImport'){
                    layer.open({
                        type: 2, // page 层类型 iframe
                        area: ['900px', '530px'],
                        title: '用户导入',
                        shade: 0.6, // 遮罩透明度
                        shadeClose: true, // 点击遮罩区域，关闭弹层
                        content: 'user-import.html',
                        end: function(){
                            //刷新表格
                            table.reload('table-user');
                        }
                    });
                } else{
                    layer.msg("功能还在路上~");
                }
            });

            //搜索部门
            $('input[name="treeDeptId"]').on('input', function(){
                var keyword = $(this).val().trim();
                $.ajax({
                    type:'GET',
                    url:server_url+'/getSysDepartmentTree',
                    dataType:'json',
                    headers:{
                        'Authorization':token
                    },
                    success: function(resp){
                        let data = resp.data;
                        /* 左侧树状部门渲染显示 */
                        tree.render({
                            elem: '#dept-tree',
                            data: searchDeptTree(data, keyword),
                            onlyIconControl: true,  // 是否仅允许节点左侧图标控制展开收缩
                            customName:{
                                id: 'deptId',
                                title: 'deptName',
                                children: 'children'
                            },
                            click: function(obj){
                                params = Object.assign({},params,{deptIds:obj.data.deptId});
                                table.reload('table-user', {
                                    page: {
                                        curr: 1, // 重新从第 1 页开始
                                        prev:'上一页',
                                        next:'下一页',
                                        limit:10,
                                        limits:[10,20,30,40,50],
                                        theme:'#409eff'
                                    },
                                    where: params // 搜索的字段
                                });
                            }
                        });
                    }
                });
            });

            //获取部门列表(初始化)
            $.ajax({
                type:'GET',
                url:server_url+'/getSysDepartmentTree',
                dataType:'json',
                headers:{
                    'Authorization':token
                },
                success: function(resp){
                    let data = resp.data;
                    /* 左侧树状部门渲染显示 */
                    tree.render({
                        elem: '#dept-tree',
                        data: data,
                        onlyIconControl: true,  // 是否仅允许节点左侧图标控制展开收缩
                        customName:{
                            id: 'deptId',
                            title: 'deptName',
                            children: 'children'
                        },
                        click: function(obj){
                            params = Object.assign({},params,{deptIds:obj.data.deptId});
                            table.reload('table-user', {
                                page: {
                                    curr: 1, // 重新从第 1 页开始
                                    prev:'上一页',
                                    next:'下一页',
                                    limit:10,
                                    limits:[10,20,30,40,50],
                                    theme:'#409eff'
                                },
                                where: params // 搜索的字段
                            });
                        }
                    });
                }
            });


            /**
             * 树状部门搜索
             * @param {Array} tree - 原始部门树数据
             * @param {String} keyword - 搜索关键词
             * @returns {Array} - 过滤后的新树状数组
             */
            function searchDeptTree(tree, keyword) {
                // 1. 如果没有关键词，直接克隆并返回全量数据（避免引用污染）
                if (!keyword || keyword.trim() === "") {
                    return JSON.parse(JSON.stringify(tree));
                }
                const query = keyword.trim();
                // 2. 使用 map + filter 进行递归过滤
                return tree.map(node => {
                    // 深度克隆当前节点，防止修改原数据
                    const newNode = { ...node };

                    // 3. 如果有子部门，先递归过滤子部门
                    if (newNode.children && newNode.children.length > 0) {
                        newNode.children = searchDeptTree(newNode.children, query);
                    }
                    return newNode;
                }).filter(node => {
                    // 4. 判断保留条件：
                    // 条件 A: 当前部门名称包含关键词
                    const isMatch = node.deptName && node.deptName.includes(query);
                    
                    // 条件 B: 子部门递归过滤后仍有数据（说明子孙节点有匹配）
                    const hasMatchingChildren = node.children && node.children.length > 0;

                    // 只要满足其一，就保留这个节点
                    return isMatch || hasMatchingChildren;
                });
            }
        })
    </script>
</body>
</html>
