<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/yaya-common.css">
    <link rel="stylesheet" href="../css/yaya-style-extend.css">
    <title>我的消息列表</title>
    <style>
        /* 1. 基础重置与变量 */
        :root {
            --primary-color: #409eff;
            --danger-color: #f56c6c;
            --bg-color: #f0f2f5;
            --card-shadow: 0 2px 12px 0 rgba(0,0,0,0.05);
            --card-hover-shadow: 0 8px 24px 0 rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            color: #303133;
            line-height: 1.6;
            padding: 10px 20px;
        }

        /* 2. 响应式容器布局 */
        .container {
            max-width: 1000px; /* 电脑端最大宽度 */
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .page-title {
            font-size: clamp(1.5rem, 5vw, 2rem); /* 字体大小随屏幕缩放 */
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        /* 3. 列表卡片布局 */
        .notice-list {
            display: grid;
            grid-template-columns: 1fr; /* 默认一列（手机端） */
            gap: 20px;
        }

        /* 当屏幕宽度大于 768px 时（平板/电脑），可以考虑并排显示或保持单行加宽 */
        @media (min-width: 768px) {
            body { padding: 40px; }
            /* 如果想在桌面端做成两列，可以取消下面注释 */
            /* .notice-list { grid-template-columns: repeat(2, 1fr); } */
        }

        .notice-item {
            display: block;
            text-decoration: none;
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid #ebeef5;
            color: inherit;
            position: relative;
            overflow: hidden;
        }

        .notice-item:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-hover-shadow);
            border-color: var(--primary-color);
        }

        /* 4. 公告内容细节 */
        .notice-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 10px;
        }

        .notice-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: #1a1a1a;
            flex: 1;
            transition: color 0.3s;
        }

        .notice-item:hover .notice-title {
            color: var(--primary-color);
        }

        .badge-important {
            background-color: var(--danger-color);
            color: white;
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .notice-meta {
            font-size: 14px;
            color: #909399;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* 5. 核心：两行省略号实现 */
        .notice-summary {
            font-size: 15px;
            color: #606266;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2; /* 限制显示两行 */
            overflow: hidden;
            text-overflow: ellipsis;
            word-break: break-all;
        }

        /* 手机端微调 */
        @media (max-width: 480px) {
            .notice-item { padding: 18px; }
            .notice-meta { flex-direction: column; align-items: flex-start; gap: 5px; }
        }

        .item-meta {
            margin-top: 10px;
            font-size: 12px;
            color: #999;
        }

        /* --- 加载状态与提示 --- */
        .status-box {
            text-align: center;
            padding: 30px 0;
            clear: both;
        }

        /* Loading 动画 */
        .loader {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #7f8c8d;
            font-size: 14px;
        }

        /* 无更多数据提示 */
        .no-more-data {
            color: #95a5a6;
            font-size: 14px;
            font-weight: bold;
            display: none; /* 默认隐藏 */
            padding: 20px;
            background: #eef2f7;
            border-radius: 8px;
        }

        /* 错误提示 */
        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            display: none;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <header class="page-header">
        <h1 class="page-title">最新公告通知</h1>
        <p style="color: #909399;font-size: 14px;">获取实时资讯，掌握企业动态</p>
    </header>
    <!-- 数据显示区域 -->
    <div id="notice-list" class="notice-list">
        
    </div>

    <!-- 加载状态区域 -->
    <div id="loading-area" class="status-box" style="display: none;">
        <div class="loader"></div>
        <div class="loading-text">正在加载更多内容...</div>
    </div>

    <!-- 点击重试区域 (出错时显示) -->
    <div id="retry-area" class="status-box error-msg">
        加载失败，点击重试
    </div>

    <!-- 结束提示区域 -->
    <div id="end-area" class="status-box no-more-data">
        — 已经到底了，没有更多数据 —
    </div>
</div>
<script src="../layui/layui.js"></script>
<script src="../js/server.js"></script>
<script>
    layui.use(function(){
        const $ = layui.$;

        // ================= 配置区域 =================
        const CONFIG = {
            pageSize: 10,          // 每页加载多少条
            scrollThreshold: 150   // 距离底部多少像素开始加载
        };

        // ================= 状态变量 =================
        let currentPage = 1;       // 当前页码
        let isLoading = false;     // 是否正在加载中 (锁)
        let hasMore = true;        // 是否还有更多数据

        // ================= 核心逻辑 =================

        // 1. 初始化加载
        loadData();

        // 2. 监听滚动事件
        $(window).on('scroll', function() {
            // 如果正在加载或没有更多数据，直接忽略
            if (isLoading || !hasMore) {
                return;
            }

            // 计算滚动位置
            const $window = $(this);
            const scrollTop = $window.scrollTop();
            const windowHeight = $window.height();
            const documentHeight = $(document).height();

            // 判断是否触底 (当前滚动 + 窗口高度 >= 文档总高度 - 阈值)
            if (scrollTop + windowHeight >= documentHeight - CONFIG.scrollThreshold) {
                loadData();
            }
        });

        // 3. 加载数据函数
        function loadData() {
            isLoading = true;
            // UI 状态更新
            $('#loading-area').show();
            $('#retry-area').hide();
            $('#end-area').hide();

            // 调用模拟 API (真实场景替换为 $.ajax)

            $.ajax({
                url: server_url+'/mySysNoticePageByDeptId',
                type:'GET',
                dataType:'json',
                headers:{
                    'Authorization': token
                },
                data:{
                    deptId:user.deptId,
                    pageNo:currentPage,
                    pageSize:CONFIG.pageSize
                },
                success: function(resp){
                    if(resp.code===0){
                        let hasPre = resp.data.hasPre;
                        if(resp.data.list.length===0){//无数据
                            hasMore = false;
                            $('#loading-area').hide();
                            $('#end-area').fadeIn();
                        }else{
                            // 渲染数据
                            renderItems(resp.data.list);
                            currentPage++; // 页码 +1
                            // 隐藏 loading
                            $('#loading-area').hide();
                            // 如果这次拿到的数据少于 pageSize，说明也是最后一页了
                            if (!hasPre) {
                                hasMore = false;
                                $('#end-area').fadeIn();
                            }
                        }
                    }else{
                        layer.msg(resp.msg)
                    }
                },
                error:function(){
                    $('#loading-area').hide();
                    $('#retry-area').text("加载失败，点击重试").fadeIn();
                    
                    // 绑定重试点击事件
                    $('#retry-area').one('click', function() {
                        loadData();
                    });
                },
                complete:function(){
                    isLoading = false;
                }
            });
        }

        // 4. 渲染 DOM 函数
        function renderItems(items) {
            const $list = $('#notice-list');
            let htmlBuffer = '';
            items.forEach(item => {
                htmlBuffer += `
                    <a href="notice-detail.html?noticeId=${item.noticeId}" class="notice-item">
                        <div class="notice-header">
                            <h2 class="notice-title">${item.noticeTitle}</h2>
                            <span class="${item.noticeLevel===0?'yaya-tag yaya-tag-success':(item.noticeLevel===1?'yaya-tag yaya-tag-warning':'yaya-tag yaya-tag-danger')}">${item.noticeLevel===0?'普通':(item.noticeLevel===1?'重要':'紧急')}</span>
                        </div>
                        <div class="notice-meta">
                            <span>发布人：${item.publishUser.username}</span>
                            <span>时间：${item.createTime}</span>
                        </div>
                        <div class="notice-summary">
                            ${item.noticeContent}
                        </div>
                    </a>
                `;
            });
            // 使用 append 追加到列表末尾
            $list.append(htmlBuffer);
        }
    });
</script>
</body>
</html>
