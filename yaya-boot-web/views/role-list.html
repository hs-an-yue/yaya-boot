<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 响应式配置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- LayUI css库 -->
    <link rel="stylesheet" href="../layui/css/layui.css">
    <link rel="stylesheet" href="../css/yaya-common.css">
    <link rel="stylesheet" href="../css/yaya-style-extend.css">
    <title>yaya-admin-plus</title>
    <style>
        .search-bar {
            padding: 16px 24px;
            border-bottom: 1px solid #eee;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            align-items: flex-end;
        }
        .form-item {
            display: flex;
            flex-direction: column;
            min-width: 150px;
        }
        input[type="text"], input[type="date"] {
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1em;
            width: 100%;
            box-sizing: border-box;
        }
        .layui-select-title>.layui-input{
            height: 34.4px;
        }
        .layui-layer-title{
            border-bottom: unset;
        }
    </style>
</head>
<body>
    <div class="yaya-container">
        <div class="layui-fluid">
            <div class="layui-panel card-border">
                <!-- 条件搜索 -->
                <form class="search-bar layui-form">
                    <div class="form-row">
                        <div class="form-item">
                            <input type="text" name="roleName"  placeholder="角色名" />
                        </div>
                        <div class="form-item">
                            <select name="status">
                                <option value="">状态</option>
                                <option value="1">停用</option>
                                <option value="0">正常</option>
                            </select>
                        </div>
                        <div class="form-item">
                            <select name="tenantId">
                                <!-- 租户列表 -->
                            </select>
                        </div>
                        <div>
                            <button class="yaya-btn yaya-primary"  lay-submit lay-filter="search">查询</button>
                            <button class="yaya-btn yaya-default" type="reset">重置</button>
                        </div>
                    </div>
                </form>
            </div>
            
            <div class="layui-panel card-border" style="margin-top: 10px;">
                <!-- 菜单操作按钮 -->
                <div style="display: flex;flex-direction: row;justify-content: flex-end;padding: 10px;">
                    <button id="del-role" type="button" class="yaya-btn yaya-danger" style="margin-right: 10px;">删除</button>
                    <button id="add-role" type="button" class="yaya-btn yaya-primary">添加</button>
                </div>
                <!-- 表格显示 -->
                <table class="layui-hide" id="table-role" lay-filter="table-role"></table>
            </div>
        </div>   
    </div>
    <script src="../layui/layui.js"></script>
    <script src="../js/server.js"></script>
    <script>
        layui.use(function(){
            const $ = layui.$;
            const form = layui.form;
            const table = layui.table;

            //租户下拉框
            //开启加载图标
            let index = layer.load(0);
            $.ajax({
                url: server_url+'/getSysTenantAll',
                type:'GET',
                dataType:'json',
                headers:{
                    'Authorization': token
                },
                success: function(resp){
                    //关闭加载图标
                    layer.close(index);
                    if(resp.code===0){
                        let list = resp.data;
                        let str='<option value="">租户</option>';
                        if(list && list.length>0){
                            for (let index = 0; index < list.length; index++) {
                                str+=`
                                    <option value="${list[index].tenantId}">${list[index].tenantName}</option>
                                `;
                            }
                        }
                        //设置到指定位置
                        $('select[name="tenantId"]').html(str);
                        //重新渲染
                        form.render("select");
                    }else{
                        layer.msg(resp.msg)
                    }
                }
            });

            

            //单元格工具事件(一般用于进行编辑和删除操作)
            table.on('tool(table-role)', function(obj){
                //事件
                let event = obj.event;
                if(event==='del'){ //删除事件
                    layer.confirm('确定删除吗？', function(index){
                        layer.close(index);//关闭弹窗
                        // 向后端发送删除请求，执行完毕后，可通过 reloadData 方法完成数据重载
                        let roleId = obj.data.roleId;
                        //开启加载图标
                        let index_ = layer.load(0);
                        $.ajax({
                            url: server_url+'/deleteSysRole',
                            type:'GET',
                            dataType:'json',
                            headers:{
                                'Authorization': token
                            },
                            data:{roleId:roleId},
                            success: function(resp){
                                //关闭加载图标
                                layer.close(index_);
                                if(resp.code===0){
                                    //刷新
                                    table.reload('table-role');
                                }else{
                                    layer.msg(resp.msg)
                                }
                            }
                        });
                    });
                }else if(event==='edit'){ //编辑事件
                    layer.open({
                        type: 2, // page 层类型 iframe
                        area: ['410px', '330px'],
                        title: '编辑',
                        shade: 0.6, // 遮罩透明度
                        shadeClose: true, // 点击遮罩区域，关闭弹层
                        content: `role-edit.html?tenantId=${obj.data.tenantId}`,
                        end: function(){
                            //刷新表格
                            table.reload('table-role');
                        },
                        success: function(layero, index){
                            let body = layer.getChildFrame('body', index);
                            // 给 iframe 页中的某个输入框赋值
                            body.find('input[name="roleId"]').val(obj.data.roleId);
                            body.find('input[name="roleName"]').val(obj.data.roleName);
                            body.find('input[name="roleSymbol"]').val(obj.data.roleSymbol);
                            body.find('input[name="remark"]').val(obj.data.remark);
                        }
                    });
                }else if(event==='auth-menu'){ //菜单授权事件
                    layer.open({
                        type: 2, // page 层类型 iframe
                        area: ['410px', '330px'],
                        title: '菜单授权',
                        shade: 0.6, // 遮罩透明度
                        shadeClose: true, // 点击遮罩区域，关闭弹层
                        content: `role-auth.html?roleId=${obj.data.roleId}`,
                        end: function(){
                            //刷新表格
                            table.reload('table-role');
                        }
                    });
                }else{
                    layer.msg("功能还在路上,敬请期待~");
                }
            });


            //角色添加
            $("#add-role").click(function(){
                layer.open({
                    type: 2, // page 层类型 iframe
                    area: ['410px', '330px'],
                    title: '添加',
                    shade: 0.6, // 遮罩透明度
                    shadeClose: true, // 点击遮罩区域，关闭弹层
                    content: 'role-add.html',
                    end: function(){
                        //刷新表格
                        table.reload('table-role');
                    }
                });

            });

            //批量删除
            $("#del-role").click(function(){
                //获取选中的数据
                let checkStatus = table.checkStatus('table-role');
                //获取要删除的角色ID
                let roles = checkStatus.data;
                if(roles && Object.keys(roles).length>0){
                    layer.confirm('确定删除吗？', function(index){
                       let roleIds = roles.map(role => role.roleId);
                        //AJAX提交
                        //开启加载图标
                        let index_ = layer.load(0);
                        $.ajax({
                            type:'post',
                            url: server_url+'/batchDeleteSysRole',
                            headers:{
                                'Authorization': token
                            },
                            contentType:'application/json',
                            data:JSON.stringify(roleIds),
                            dataType:'json',
                            success:function(resp){
                                //关闭加载图标
                                layer.close(index_);
                                if(resp.code===0){
                                    //关闭弹窗
                                    layer.close(index);
                                    //刷新表格
                                    table.reload('table-role');
                                }else{
                                    layer.msg(resp.msg);
                                }
                            }
                        }); 
                    });
                }else{
                    layer.msg('请选择要删除的角色');
                }
            });

            //搜索渲染
            form.on('submit(search)', function(data){
                let field = data.field; // 获得表单字段
                // 执行搜索重载
                table.reload('table-role', {
                    page: {
                        curr: 1, // 重新从第 1 页开始
                        prev:'上一页',
                        next:'下一页',
                        limit:10,
                        limits:[10,20,30,40,50],
                        theme:'#409eff'
                    },
                    where: field // 搜索的字段
                });
                return false; // 阻止默认 form 跳转
            });
            
            //表格渲染
            table.render({
                elem: '#table-role',
                url: server_url+'/getSysRolePage',
                headers:{
                    'Authorization':token
                },
                skin:'line',
                height:'full',
                parseData: function(res){
                    return {
                        "code" : res.code,
                        "msg"  : res.msg,
                        "data" : res.data.list,
                        "count": res.data.count
                    }
                },
                page:{
                    prev:'上一页',
                    next:'下一页',
                    limit:10,
                    limits:[10,20,30,40,50],
                    theme:'#409eff'
                },
                request: {
                    pageName: 'pageNo', // 页码的参数名称，默认：page
                    limitName: 'pageSize' // 每页数据条数的参数名，默认：limit
                },
                cols: [[
                    {type: 'checkbox', fixed: 'left'},
                    {
                        title: '#',
                        type: 'numbers'
                    },
                    {
                        field:'roleName',
                        title: '角色名称'
                    },
                    {
                        title: '权限字符',
                        width:'15%',
                        templet: function(d){
                            return `<span style='color:#1476ff;background-color:#e6f4ff;border-color:#8fc9ff;padding:4px 9px;border-radius:4px;font-size:12px;'>${d.roleSymbol}</span>`;
                        }
                    },
                    {
                        title: '租户',
                        templet: function(d){
                            return d.sysTenant?d.sysTenant.tenantName:'-';
                        }
                    },
                    {
                        title: '状态',
                        templet: function(d){
                            let status = d.status;
                            if(status===0){
                                return `<span style='color:#1476ff;background-color:#e6f4ff;border-color:#8fc9ff;padding:4px 9px;border-radius:4px;font-size:12px;'>正常</span>`;
                            }else{
                                return `<span style='color:#ff3860;background-color:#fff0f0;border-color:#ffb3ba;padding:4px 9px;border-radius:4px;font-size:12px;'>停用</span>`;
                            }
                        }
                    },
                    {
                        field:'createTime',
                        width:'15%',
                        title: '创建时间'
                    },
                    {
                        field:'remark',
                        title: '备注'
                    },
                    {
                        title: '操作',
                        width:'15%',
                        fixed: 'right',
                        templet: function(){
                            let str='<button class="yaya-btn is-link-primary yaya-btn-small" lay-event="edit">更新</button>';
                            str+='<button class="yaya-btn is-link-danger yaya-btn-small" lay-event="del">删除</button>';
                            str+='<button class="yaya-btn is-link-success yaya-btn-small" lay-event="auth-menu">菜单授权</button>';
                            return str;
                        }
                    }
                ]]
            })
        });
    </script>
</body>
</html>
