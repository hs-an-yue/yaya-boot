<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../layui/css/layui.css">
    <link rel="stylesheet" href="../css/yaya-common.css">
    <link rel="stylesheet" href="../css/yaya-style-extend.css">
    <title>公告详情</title>
    <style>
        :root {
            --primary-color: #409eff;
            --danger-color: #f56c6c;
            --warning-color: #e6a23c;
            --success-color: #67c23a;
            --text-main: #303133;
            --text-secondary: #909399;
            --border-color: #dcdfe6;
        }

        body {
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }

        /* 容器布局 */
        .notice-container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        /* 顶部操作栏 */
        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
        }

        /* 标题区域 */
        .header-section {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 28px; color: #2c3e50; }

        /* 元数据展示 */
        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .meta-item b { color: var(--text-main); margin-right: 5px; }

        /* 正文区域 */
        .notice-content {
            line-height: 1.8;
            font-size: 16px;
        }

        /* 插图样式 */
        .content-img {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 20px auto;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            table-layout: fixed;
        }

        .data-table th, .data-table td {
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: left;
        }

        .data-table th {
            background-color: #f8f9fb;
            color: var(--text-main);
        }

        /* 按钮样式 */
        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            background: #fff;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .btn:hover { opacity: 0.8; }

        /* 打印适配 */
        @media print {
            .action-bar, .btn-confirm-wrapper { display: none; }
            body { background: #fff; padding: 0; }
            .notice-container { box-shadow: none; max-width: 100%; }
        }
    </style>
</head>
<body>
<div class="notice-container" id="notice-container">
    <!-- 详情内容显示区域 -->
</div>
<script id="ID-notice-tpl" type="text/html">
    <!-- 公告顶部信息区域 -->
    <div class="header-section">
        <div class="title-row">
            {{ if(d.noticeLevel===0){ }}
            <span class="yaya-tag yaya-tag-success">普通</span>
            {{ } else if(d.noticeLevel===1){ }}
            <span class="yaya-tag yaya-tag-warning">重要</span>
            {{ } else { }}
            <span class="yaya-tag yaya-tag-danger">紧急</span>
            {{ }  }}
            <h1 id="noticeTitle">{{=d.noticeTitle}}</h1>
            {{ if(d.isTop === 1){ }}
              <span style="font-size: 24px;">🆙</span>
            {{ } }}
        </div>
        <div class="meta-grid">
            <div class="meta-item"><b>发起人:</b> <span id="author">{{=d.publishUser.username}}</span></div>
            <div class="meta-item"><b>发起时间:</b> <span id="createTime">{{=d.createTime}}</span></div>
            <div class="meta-item"><b>公告类型:</b> <span id="noticeType">{{=d.sysNoticeType.noticeTypeName}}</span></div>
        </div>
    </div>
    <article class="notice-content">
        <!-- 内容显示区域 -->
         {{-d.noticeContent}}
    </article>
</script>
<script src="../layui/layui.js"></script>
<script src="../js/server.js"></script>
<script>
    layui.use(function(){
        const $ = layui.$;
        const layer = layui.layer;
        const laytpl = layui.laytpl;

        //获取url地址中的参数
        let url = layui.url();
        let search = url.search;
        let noticeId = search.noticeId;
        
        // 获取模板字符
        let template = document.getElementById('ID-notice-tpl').innerHTML; 
        // 输出结果的目标元素
        let target = document.getElementById('notice-container'); 
        

        
        //获取公告详情
        let index_ = layer.load(0);//开启加载图标
        $.ajax({
            url: server_url+'/getSysNoticeById',
            type:'GET',
            dataType:'json',
            headers:{
                'Authorization': token
            },
            data:{noticeId:noticeId},
            success: function(resp){
                //关闭加载图标
                layer.close(index_);
                if(resp.code===0){
                    console.log(resp);
                    if(resp.code===0){
                        // 渲染并输出结果
                        laytpl(template,{tagStyle: 'modern'}).render(resp.data, function(html) {
                            target.innerHTML = html;
                        });    
                    }else{
                        layer.msg(resp.msg);
                    }
                }else{
                    layer.msg(resp.msg)
                }
            }
        });
        
    });
</script>
</body>
</html>
