<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <title>登陆</title>
    <link href="layui/css/layui.css" rel="stylesheet">
    <link href="css/yaya-common.css" rel="stylesheet">
    <style>
        .footer{
            position: fixed;
            bottom: 0;
            left: 0;
            text-align: center;
            width: 100%;
        }
        .lg-bg{
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            align-content: center;
            justify-content: center;
            height: 85vh;
        }
        .lg-bg>img{
            width: 700px;
        }
        .lg-form{
            width: 85%;
            margin-top: 20px;
        }
        .lg-title{
            text-align: center;
            margin-top: 180px;
            width: 85%;
            color: #1e9fff;
        }
        .layui-input:focus,.layui-textarea:focus {
            border-color: #1e9fff!important;
            box-shadow: 0 0 0 3px rgba(22,183,119,.08)
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="layui-row">
        <div class="layui-col-md8 lg-bg">
            <!-- 图片LOGO -->
            <img src="image/bg/login-bg2.svg" alt="bg">
        </div>
        <div class="layui-col-md3" style="display: flex;flex-direction: column;justify-content: center;align-content: center;">
            <h2 class="lg-title">YaYa多平台(SaaS)管理系统</h2>
            <!-- 表单 -->
            <form class="layui-form lg-form">
                <div class="demo-login-container">
                    <div class="layui-form-item">
                        <div class="layui-input-wrap">
                            <div class="layui-input-prefix">
                                <i class="layui-icon layui-icon-username"></i>
                            </div>
                            <input type="text" name="phone"  lay-verify="required" placeholder="用户名" lay-reqtext="请填写用户名" autocomplete="off" class="layui-input" lay-affix="clear">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-input-wrap">
                            <div class="layui-input-prefix">
                                <i class="layui-icon layui-icon-password"></i>
                            </div>
                            <input type="password" name="password"  lay-verify="required" placeholder="密   码" lay-reqtext="请填写密码" autocomplete="off" class="layui-input" lay-affix="eye">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-row">
                            <div class="layui-col-xs7">
                                <div class="layui-input-wrap">
                                    <div class="layui-input-prefix">
                                        <i class="layui-icon layui-icon-vercode"></i>
                                    </div>
                                    <input type="text" name="captcha"  lay-verify="required" placeholder="验证码" lay-reqtext="请填写验证码" autocomplete="off" class="layui-input" lay-affix="clear">
                                </div>
                            </div>
                            <div class="layui-col-xs5">
                                <div style="margin-left: 10px;">
                                    <img id="captchaId" src="image/captcha.gif">
                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" name="uuid">
                    <div class="layui-form-item">
                        <input type="checkbox" name="remember" lay-skin="primary" title="记住密码">
                        <a href="#forget" style="float: right; margin-top: 7px;">忘记密码？</a>
                    </div>
                    <div class="layui-form-item">
                        <button class="layui-btn layui-bg-blue layui-btn-fluid" lay-submit lay-filter="login">登录</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<div class="footer" style="font-size: 12px;color: #c0c0c0;">

<script src="layui/layui.js"></script>
<!-- 服务器基本信息配置文件 -->
<script src="js/server.js"></script>
<script>
    layui.use(function(){
        const $ = layui.$;
        const layer = layui.layer;
        const form = layui.form;

        //调用验证码获取函数
        getCaptcha();
        /**
         * 验证码获取函数 
         */
        function getCaptcha(){
            //开启加载图标
            let index = layer.load(0);
            $.getJSON(server_url+"/captchaImage",function(resp){
                //关闭加载图标
                layer.close(index);
                if(resp.code===0){
                    const img = resp.data.img;
                    //设置到图片标签
                    $("#captchaId")[0].src=img;
                    //设置uuid
                    $('input[name="uuid"]').val(resp.data.uuid);
                }else{
                    layer.msg(resp.msg);
                }
            });
        }
        //刷新验证码
        $("#captchaId").click(function(){
            getCaptcha();
        });

        //提交登陆
        form.on('submit(login)', function(data){
            //获取提交参数
            const params = data.field;
            //开启加载图标
            let index = layer.load(0);
            $.post(server_url+"/login",params,function(resp){
                //关闭加载图标
                layer.close(index);
                if(resp.code===0){
                    //登陆成功,将用户信息保存到浏览器的本地存储中(如果想长期存储保存到localStorage中，如果想会话存储,保存到sessionStorage中)
                    //保存token
                    layui.sessionData("yaya", {
                        key:'token',
                        value:resp.data.token
                    });
                    //保存用户信息
                    layui.sessionData("yaya", {
                        key:'user',
                        value:resp.data.user
                    });
                    //登陆成功跳转到首页
                    location.href='index.html';
                }else{
                    layer.msg(resp.msg)
                }
            });
            
            return false;
        })
        
    });
</script>
</body>
</html>
